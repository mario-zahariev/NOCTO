repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: nocto-semgrep-security
        name: NOCTO Semgrep Swift/iOS security rules
        entry: semgrep --config .semgrep.yml --error
        language: system
        pass_filenames: false
