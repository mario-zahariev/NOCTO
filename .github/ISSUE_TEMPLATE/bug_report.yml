name: Bug report
description: Report a reproducible bug
labels: [bug]
title: "[bug] "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is happening?
      placeholder: Short, concrete bug description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps and environment.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Build log excerpt, stack trace, or screenshot if available.
      placeholder: Paste relevant logs or attach screenshots.

  - type: input
    id: version
    attributes:
      label: App/commit version
      description: Commit SHA, tag, or build number.
      placeholder: e.g. 07dc0b0
