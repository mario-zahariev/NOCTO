name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  swift-package-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Guard Firebase detachment
        run: bash scripts/ci/check_firebase_detached.sh

      - name: Validate venues schema
        run: python3 scripts/validate_venues_json.py

      - name: Run Unit Tests
        run: swift test

  iOS-build-smoke:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.x
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.x not found on runner."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build App (Simulator)
        run: |
          xcodebuild \
            -project NOCTO.xcodeproj \
            -scheme NOCTO \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Visual Integrity Gate
        env:
          NOCTO_RECORD_SNAPSHOTS: "0"
        run: |
          IOS_RUNTIME_VERSION="26.1"
          NOCTO_VISUAL_DERIVED_DATA="${RUNNER_TEMP}/nocto-visual-derived-data"
          NOCTO_VISUAL_DESTINATION="platform=iOS Simulator,name=iPhone 17,OS=${IOS_RUNTIME_VERSION}"

          if ! xcrun simctl list runtimes | grep -Fq "iOS $IOS_RUNTIME_VERSION"; then
            xcodebuild -downloadPlatform iOS -buildVersion "$IOS_RUNTIME_VERSION"
          fi

          if ! xcrun simctl list runtimes | grep -Fq "iOS $IOS_RUNTIME_VERSION"; then
            echo "iOS $IOS_RUNTIME_VERSION Simulator runtime is not installed."
            xcrun simctl list runtimes
            exit 1
          fi

          xcodebuild \
            -project NOCTO.xcodeproj \
            -scheme NOCTO \
            -destination "$NOCTO_VISUAL_DESTINATION" \
            -derivedDataPath "$NOCTO_VISUAL_DERIVED_DATA" \
            build-for-testing

          run_visual_snapshot() {
            xcodebuild \
              -project NOCTO.xcodeproj \
              -scheme NOCTO \
              -destination "$NOCTO_VISUAL_DESTINATION" \
              -derivedDataPath "$NOCTO_VISUAL_DERIVED_DATA" \
              -only-testing:"$1" \
              test-without-building
          }

          run_visual_snapshot 'NOCTOUITests/LiveActivitySnapshotTests'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testHomeView_snapshot'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testNightPulseView_snapshot'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testProfileView_snapshot'
