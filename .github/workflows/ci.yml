name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  swift-package-tests:
    name: Architecture Guard & Unit Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Select Xcode 26.x
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.x not found on runner."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Swift Version
        run: swift --version

      - name: Guard Firebase detachment
        run: bash scripts/ci/check_firebase_detached.sh

      - name: Validate venues schema
        run: python3 scripts/validate_venues_json.py

      - name: Run Unit Tests
        run: swift test

  iOS-build-smoke:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Select Xcode 26.x
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.x not found on runner."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build App (Simulator)
        run: |
          xcodebuild \
            -project NOCTO.xcodeproj \
            -scheme NOCTO \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Visual Integrity Gate
        timeout-minutes: 12
        env:
          NOCTO_RECORD_SNAPSHOTS: "0"
          TEST_RUNNER_NOCTO_RECORD_SNAPSHOTS: "0"
          NOCTO_SNAPSHOT_PIXEL_TOLERANCE: "0.03"
          TEST_RUNNER_NOCTO_SNAPSHOT_PIXEL_TOLERANCE: "0.03"
        run: |
          xcodebuild \
            -project NOCTO.xcodeproj \
            -scheme NOCTO \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -only-testing:NOCTOUITests/LiveActivitySnapshotTests \
            -only-testing:NOCTOUITests/ScreenSnapshotTests/testHomeView_snapshot \
            -only-testing:NOCTOUITests/ScreenSnapshotTests/testNightPulseView_snapshot \
            -only-testing:NOCTOUITests/ScreenSnapshotTests/testProfileView_snapshot \
            test
