name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  architecture-guard-unit-tests:
    name: Architecture Guard & Unit Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Swift Version
        run: swift --version

      - name: Guard Firebase detachment
        run: bash scripts/ci/check_firebase_detached.sh

      - name: Validate venues schema
        run: python3 scripts/validate_venues_json.py

      - name: Run Unit Tests
        run: swift test

  gitleaks-full-history-scan:
    name: Gitleaks full-history scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          GITLEAKS_ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "${GITLEAKS_ASSET}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ASSET}"
          curl -sSfL -o gitleaks_checksums.txt \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${GITLEAKS_ASSET}$" gitleaks_checksums.txt | sha256sum -c -
          tar -xzf "${GITLEAKS_ASSET}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --redact --no-banner --verbose

  semgrep-oss-scan:
    name: semgrep-oss/scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: python3 -m pip install --no-cache-dir semgrep==1.167.0

      - name: Run Semgrep OSS scan
        env:
          SEMGREP_SEND_METRICS: "off"
        run: semgrep scan --config=p/ci --error --metrics=off .

  iOS-build-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Select Xcode 26.x
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26.x not found on runner."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build App (Simulator)
        run: |
          xcodebuild \
            -project NOCTO.xcodeproj \
            -scheme NOCTO \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            build

      - name: Visual Integrity Gate
        env:
          NOCTO_RECORD_SNAPSHOTS: "0"
          NOCTO_SNAPSHOT_PIXEL_TOLERANCE: "0.03"
          TEST_RUNNER_NOCTO_SNAPSHOT_PIXEL_TOLERANCE: "0.03"
        run: |
          run_visual_snapshot() {
            xcodebuild \
              -project NOCTO.xcodeproj \
              -scheme NOCTO \
              -destination 'platform=iOS Simulator,name=iPhone 17' \
              -only-testing:"$1" \
              test
          }

          run_visual_snapshot 'NOCTOUITests/LiveActivitySnapshotTests'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testHomeView_snapshot'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testNightPulseView_snapshot'
          run_visual_snapshot 'NOCTOUITests/ScreenSnapshotTests/testProfileView_snapshot'
