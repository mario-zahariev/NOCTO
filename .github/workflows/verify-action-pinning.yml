name: Verify action pinning

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-pinned-actions:
    name: Check for pinned action refs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflows
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Find unpinned actions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, glob, sys
          ok = True
          pattern = re.compile(r'^\s*uses:\s*([^\s]+)@([^\s]+)', re.MULTILINE)
          for path in sorted(glob.glob('.github/workflows/*.yml') + glob.glob('.github/workflows/*.yaml')):
              txt = open(path, 'r', encoding='utf-8').read()
              for m in pattern.finditer(txt):
                  owner_repo, ref = m.group(1), m.group(2)
                  # allow exact commit SHA (40 hex chars)
                  if re.fullmatch(r'[0-9a-f]{40}', ref):
                      continue
                  # reject branch names, tags, and shortened SHAs
                  print(f"Unpinned action in {path}: {owner_repo}@{ref}")
                  ok = False
          if not ok:
              sys.exit(1)
          print("All actions pinned to immutable SHAs.")
          PY
